<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCBook Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --surface-2: #16161f;
      --border:    #1e1e2e;
      --accent:    #4ade80;
      --accent-bg: rgba(74,222,128,0.07);
      --text:      #ffffff;
      --text-2:    #8b8b9e;
      --text-3:    #55556a;
      --danger:    #ef4444;
      --warning:   #f59e0b;
      --sidebar-w: 240px;
      --topbar-h:  60px;
      --radius:    12px;
      --radius-sm: 8px;
      --ease:      0.18s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    * { scrollbar-width: thin; scrollbar-color: var(--border) var(--bg); }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
    }

    /* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
      transition: transform 0.25s cubic-bezier(0.22,1,0.36,1);
    }
    .sidebar-logo {
      padding: 20px 20px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: var(--accent-bg);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .sidebar-logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #4ade80, #86efac);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav {
      flex: 1;
      padding: 12px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .nav-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      padding: 10px 10px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
      border: none;
      background: none;
      font-family: inherit;
      text-align: left;
      width: 100%;
    }
    .nav-item:hover  { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
    .nav-item svg    { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 14px 10px;
      border-top: 1px solid var(--border);
    }

    /* ══ MAIN WRAPPER ══════════════════════════════════════════════════════════ */
    .main-wrap {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ══ TOP BAR ══════════════════════════════════════════════════════════════ */
    .topbar {
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .topbar-email {
      font-size: 0.78rem;
      color: var(--text-2);
    }
    .hamburger {
      display: none;
      background: none;
      border: none;
      color: var(--text-2);
      cursor: pointer;
      padding: 6px;
    }
    .hamburger svg { width: 22px; height: 22px; display: block; }

    /* ══ CONTENT ══════════════════════════════════════════════════════════════ */
    .content {
      flex: 1;
      padding: 28px;
      max-width: 1400px;
      width: 100%;
    }

    /* ══ STAT CARDS ══════════════════════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .stat-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
    }
    .stat-value.accent { color: var(--accent); }

    /* ══ SKELETON ══════════════════════════════════════════════════════════════ */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skel {
      background: linear-gradient(90deg, var(--surface-2) 25%, var(--border) 50%, var(--surface-2) 75%);
      background-size: 800px 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 6px;
    }
    .skel-stat { height: 36px; width: 80px; margin-top: 6px; }
    .skel-label { height: 12px; width: 110px; margin-bottom: 10px; }
    .skel-row {
      height: 52px;
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    /* ══ TABLE SECTION ══════════════════════════════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .search-bar {
      flex: 1;
      max-width: 320px;
      position: relative;
    }
    .search-bar svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text-3);
      pointer-events: none;
    }
    .search-bar input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.83rem;
      font-family: inherit;
      outline: none;
      transition: border-color var(--ease);
    }
    .search-bar input:focus  { border-color: rgba(74,222,128,0.5); }
    .search-bar input::placeholder { color: var(--text-3); }

    /* Table wrapper */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.67rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr.client-row { border-bottom: 1px solid var(--border); }
    tbody tr.client-row:last-child { border-bottom: none; }
    tbody tr.client-row:hover td { background: rgba(255,255,255,0.02); }
    tbody td {
      padding: 14px 16px;
      vertical-align: middle;
      transition: background var(--ease);
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .badge-green {
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.25);
      color: var(--accent);
    }
    .badge-yellow {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      color: var(--warning);
    }
    .badge-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Fee edit cell */
    .fee-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .fee-display { display: flex; align-items: center; gap: 5px; }
    .fee-edit-wrap { display: none; align-items: center; gap: 6px; }
    .fee-edit-wrap.active { display: flex; }
    .fee-display.hidden { display: none; }
    .fee-input {
      width: 68px;
      padding: 5px 8px;
      background: var(--bg);
      border: 1px solid rgba(74,222,128,0.5);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.83rem;
      font-family: inherit;
      outline: none;
    }
    .fee-input:focus { box-shadow: 0 0 0 2px rgba(74,222,128,0.15); }
    .fee-error { font-size: 0.72rem; color: var(--danger); display: none; }
    .fee-error.visible { display: block; }

    /* Icon button */
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 4px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--ease), background var(--ease);
    }
    .btn-icon:hover { color: var(--accent); background: var(--accent-bg); }
    .btn-icon svg { width: 14px; height: 14px; }

    /* Small buttons */
    .btn-sm {
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: 1px solid;
      transition: filter var(--ease), opacity var(--ease);
    }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-save   { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
    .btn-cancel { background: transparent; color: var(--text-2); border-color: var(--border); }
    .btn-save:hover   { filter: brightness(1.1); }
    .btn-cancel:hover { color: var(--text); border-color: var(--text-2); }

    /* Details toggle */
    .btn-details {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 0.75rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-2);
      cursor: pointer;
      transition: border-color var(--ease), color var(--ease), background var(--ease);
      white-space: nowrap;
    }
    .btn-details:hover  { border-color: rgba(74,222,128,0.4); color: var(--accent); }
    .btn-details.open   { background: var(--accent-bg); border-color: rgba(74,222,128,0.3); color: var(--accent); }

    /* Expansion row */
    .expansion-row { display: none; }
    .expansion-row.open { display: table-row; }
    .expansion-cell {
      padding: 0 !important;
      border-bottom: 1px solid var(--border);
    }
    .expansion-inner {
      padding: 16px 20px;
      background: var(--surface-2);
    }
    .expansion-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.78rem;
    }
    .mini-table th {
      text-align: left;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-3);
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }
    .mini-table td {
      padding: 9px 10px;
      color: var(--text-2);
      border-bottom: 1px solid rgba(30,30,46,0.5);
    }
    .mini-table tr:last-child td { border-bottom: none; }
    .no-bookings {
      color: var(--text-3);
      font-style: italic;
      padding: 10px 0;
      font-size: 0.8rem;
    }

    /* Empty + error states */
    .empty-row td {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-3);
      font-size: 0.85rem;
    }
    .error-card {
      background: var(--surface);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
      max-width: 440px;
      margin: 0 auto;
    }
    .error-card h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }
    .error-card p { font-size: 0.83rem; color: var(--text-2); margin-bottom: 20px; line-height: 1.55; }
    .btn-retry {
      padding: 10px 22px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 50px;
      font-size: 0.88rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: filter var(--ease);
    }
    .btn-retry:hover { filter: brightness(1.1); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #0a0a0f;
      font-size: 0.83rem;
      font-weight: 700;
      padding: 10px 18px;
      border-radius: 50px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* Sidebar overlay (mobile) */
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 90;
    }
    .sidebar-overlay.open { display: block; }

    /* ══ WIDGET SETTINGS SECTION ══════════════════════════════════════════════ */
    .expansion-settings {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .setting-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }
    .setting-desc {
      font-size: 0.72rem;
      color: var(--text-3);
      line-height: 1.45;
    }
    /* Toggle switch */
    .toggle { position: relative; display: inline-block; width: 38px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .toggle-input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 22px;
      transition: background var(--ease);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: var(--text-2);
      border-radius: 50%;
      transition: transform var(--ease), background var(--ease);
    }
    .toggle-input:checked + .toggle-slider { background: rgba(74,222,128,0.3); border: 1px solid rgba(74,222,128,0.5); }
    .toggle-input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--accent); }

    /* ══ RESPONSIVE ════════════════════════════════════════════════════════════ */
    @media (max-width: 1100px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .main-wrap {
        margin-left: 0;
      }
      .hamburger { display: flex; }
      .topbar-email { display: none; }
      .content { padding: 20px 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      /* Hide less important columns on mobile */
      th:nth-child(3), td:nth-child(3),
      th:nth-child(7), td:nth-child(7) { display: none; }
    }
    @media (max-width: 500px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      th:nth-child(5), td:nth-child(5),
      th:nth-child(6), td:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">&#128274;</div>
      <span class="sidebar-logo-text">MCBook Admin</span>
    </div>
    <nav class="nav">
      <div class="nav-label">Navigation</div>
      <button class="nav-item active" id="nav-overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Overview
      </button>
      <button class="nav-item" id="nav-clients">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Clients
      </button>
      <button class="nav-item" id="nav-earnings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
        Earnings
      </button>
    </nav>
    <div class="sidebar-footer">
      <button class="nav-item" id="btn-signout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main-wrap">

    <!-- Top bar -->
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="topbar-title" id="page-title">Overview</span>
      </div>
      <div class="topbar-right">
        <span class="topbar-email" id="admin-email"></span>
        <button class="btn-sm btn-cancel" id="topbar-signout" style="border-radius:50px;">Sign Out</button>
      </div>
    </header>

    <!-- Content -->
    <main class="content" id="main-content">

      <!-- Loading state -->
      <div id="state-loading">
        <div class="stats-grid">
          <div class="stat-card"><div class="skel skel-label"></div><div class="skel skel-stat"></div></div>
          <div class="stat-card"><div class="skel skel-label"></div><div class="skel skel-stat"></div></div>
          <div class="stat-card"><div class="skel skel-label"></div><div class="skel skel-stat"></div></div>
          <div class="stat-card"><div class="skel skel-label"></div><div class="skel skel-stat"></div></div>
        </div>
        <div class="table-wrap" style="padding:16px;">
          <div class="skel skel-row"></div>
          <div class="skel skel-row"></div>
          <div class="skel skel-row"></div>
          <div class="skel skel-row"></div>
          <div class="skel skel-row"></div>
        </div>
      </div>

      <!-- Error state -->
      <div id="state-error" style="display:none; padding-top:60px;">
        <div class="error-card">
          <h2>&#9888;&#65039; Failed to load data</h2>
          <p id="error-text">An error occurred while fetching admin stats. Please try again.</p>
          <button class="btn-retry" id="btn-retry">Retry</button>
        </div>
      </div>

      <!-- Data state -->
      <div id="state-data" style="display:none;">
        <!-- Stat cards -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total Clients</div>
            <div class="stat-value" id="stat-clients">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Platform Revenue</div>
            <div class="stat-value accent" id="stat-revenue">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Active Stripe Accounts</div>
            <div class="stat-value" id="stat-stripe">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Bookings This Month</div>
            <div class="stat-value" id="stat-bookings">—</div>
          </div>
        </div>

        <!-- Table header + search -->
        <div class="section-header">
          <span class="section-title">Clients</span>
          <div class="search-bar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-input" placeholder="Search by name or email…">
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Business Name</th>
                <th>Email</th>
                <th>Joined</th>
                <th>Stripe</th>
                <th>Earnings</th>
                <th>My Cut</th>
                <th>Fee %</th>
                <th>Bookings</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="clients-tbody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const ADMIN_EMAIL  = 'matthiasdevelopment@gmail.com'
    const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVpanVkZ25xYXd0dmp5anV5dXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MjI1NDQsImV4cCI6MjA5MTA5ODU0NH0.MkIJL-GmeAzUsyinykQWa0-4mjAWTf-WEuZelLouDYg'
    const STATS_URL    = 'https://uijudgnqawtvjyjuyuwo.supabase.co/functions/v1/admin-stats'
    const UPDATE_URL   = 'https://uijudgnqawtvjyjuyuwo.supabase.co/functions/v1/admin-update-client'

    const aud = (n) => new Intl.NumberFormat('en-AU', { style: 'currency', currency: 'AUD' }).format(n)
    const dt  = (s) => s ? new Date(s).toLocaleDateString('en-AU') : '—'

    let allClients = []
    let expandedId = null

    // ── Auth guard ────────────────────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession()
    if (!session || session.user.email !== ADMIN_EMAIL) {
      window.location.href = 'admin-login.html'
      throw new Error('Redirecting')
    }

    document.getElementById('admin-email').textContent = session.user.email

    // ── Sign out ───────────────────────────────────────────────────────────────
    async function doSignOut() {
      await supabase.auth.signOut()
      window.location.href = 'admin-login.html'
    }
    document.getElementById('btn-signout').addEventListener('click', doSignOut)
    document.getElementById('topbar-signout').addEventListener('click', doSignOut)

    // ── Hamburger ──────────────────────────────────────────────────────────────
    const sidebar  = document.getElementById('sidebar')
    const overlay  = document.getElementById('sidebar-overlay')
    function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
    document.getElementById('hamburger').addEventListener('click', openSidebar)
    overlay.addEventListener('click', closeSidebar)

    // ── Nav items (all point to same page for now) ──────────────────────────
    ;['nav-overview','nav-clients','nav-earnings'].forEach(id => {
      document.getElementById(id)?.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
        document.getElementById(id).classList.add('active')
        closeSidebar()
      })
    })

    // ── Toast ─────────────────────────────────────────────────────────────────
    let toastTimer
    function showToast(msg) {
      const el = document.getElementById('toast')
      el.textContent = msg
      el.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => el.classList.remove('show'), 2400)
    }

    // ── State helpers ─────────────────────────────────────────────────────────
    function showState(name) {
      document.getElementById('state-loading').style.display = name === 'loading' ? '' : 'none'
      document.getElementById('state-error').style.display   = name === 'error'   ? '' : 'none'
      document.getElementById('state-data').style.display    = name === 'data'    ? '' : 'none'
    }

    // ── Load data ─────────────────────────────────────────────────────────────
    async function loadData() {
      showState('loading')
      try {
        const res = await fetch(STATS_URL, {
          headers: {
            Authorization: `Bearer ${session.access_token}`,
            apikey: ANON_KEY,
          }
        })
        if (!res.ok) {
          const err = await res.json().catch(() => ({}))
          throw new Error(err.error || `HTTP ${res.status}`)
        }
        const data = await res.json()
        renderData(data)
        showState('data')
      } catch (err) {
        document.getElementById('error-text').textContent = err.message || 'An unexpected error occurred.'
        showState('error')
      }
    }

    document.getElementById('btn-retry').addEventListener('click', loadData)

    // ── Render ────────────────────────────────────────────────────────────────
    function renderData(data) {
      allClients = data.clients ?? []

      // Stat cards
      document.getElementById('stat-clients').textContent  = data.totalClients
      document.getElementById('stat-stripe').textContent   = data.activeStripeAccounts
      document.getElementById('stat-bookings').textContent = data.bookingsThisMonth

      const totalMyRevenue = allClients.reduce((s, c) => s + (c.myRevenue || 0), 0)
      document.getElementById('stat-revenue').textContent = aud(totalMyRevenue)

      renderTable(allClients)
    }

    function renderTable(clients) {
      const tbody = document.getElementById('clients-tbody')
      if (!clients.length) {
        tbody.innerHTML = `<tr class="empty-row"><td colspan="9">No clients found.</td></tr>`
        return
      }

      tbody.innerHTML = ''
      clients.forEach(client => {
        const clientRow = document.createElement('tr')
        clientRow.className = 'client-row'
        clientRow.dataset.id = client.id

        const stripeBadge = client.stripe_charges_enabled
          ? `<span class="badge badge-green"><span class="badge-dot"></span>Active</span>`
          : `<span class="badge badge-yellow"><span class="badge-dot"></span>Pending</span>`

        clientRow.innerHTML = `
          <td><strong style="font-size:0.85rem;">${escHtml(client.business_name || '—')}</strong></td>
          <td style="color:var(--text-2);font-size:0.8rem;">${escHtml(client.email || '—')}</td>
          <td style="color:var(--text-3);font-size:0.78rem;">${dt(client.created_at)}</td>
          <td>${stripeBadge}</td>
          <td style="font-variant-numeric:tabular-nums;">${aud(client.totalEarnings)}</td>
          <td style="color:var(--accent);font-variant-numeric:tabular-nums;">${aud(client.myRevenue)}</td>
          <td>
            <div class="fee-cell">
              <div class="fee-display" id="fee-display-${escAttr(client.id)}">
                <span id="fee-value-${escAttr(client.id)}">${Number(client.platform_fee_percent).toFixed(2)}%</span>
                <button class="btn-icon" title="Edit fee" data-edit="${escAttr(client.id)}">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
              </div>
              <div class="fee-edit-wrap" id="fee-edit-${escAttr(client.id)}">
                <input class="fee-input" type="number" min="0" max="100" step="0.01"
                  id="fee-input-${escAttr(client.id)}"
                  value="${Number(client.platform_fee_percent).toFixed(2)}">
                <button class="btn-sm btn-save" data-save="${escAttr(client.id)}">Save</button>
                <button class="btn-sm btn-cancel" data-cancel="${escAttr(client.id)}">Cancel</button>
              </div>
              <div class="fee-error" id="fee-err-${escAttr(client.id)}"></div>
            </div>
          </td>
          <td style="color:var(--text-2);">${client.bookingCount}</td>
          <td>
            <button class="btn-details" data-toggle="${escAttr(client.id)}">&#9660; Details</button>
          </td>
        `
        tbody.appendChild(clientRow)

        // Expansion row
        const expandRow = document.createElement('tr')
        expandRow.className = 'expansion-row'
        expandRow.id = `expand-${client.id}`
        const expandCell = document.createElement('td')
        expandCell.className = 'expansion-cell'
        expandCell.colSpan = 9
        expandCell.innerHTML = buildExpansion(client)
        expandRow.appendChild(expandCell)
        tbody.appendChild(expandRow)
      })

      // Events: fee edit
      tbody.querySelectorAll('[data-edit]').forEach(btn => {
        btn.addEventListener('click', () => startFeeEdit(btn.dataset.edit))
      })
      tbody.querySelectorAll('[data-save]').forEach(btn => {
        btn.addEventListener('click', () => saveFee(btn.dataset.save))
      })
      tbody.querySelectorAll('[data-cancel]').forEach(btn => {
        btn.addEventListener('click', () => cancelFeeEdit(btn.dataset.cancel))
      })
      // Events: row toggle
      tbody.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => toggleExpansion(btn.dataset.toggle, btn))
      })
      // Events: custom styling toggle
      tbody.querySelectorAll('[data-styling]').forEach(chk => {
        chk.addEventListener('change', () => saveCustomStyling(chk.dataset.styling, chk.checked, chk))
      })
    }

    function buildExpansion(client) {
      const bookingsHtml = client.recentBookings?.length
        ? `
          <div class="expansion-label">Recent Bookings (last 5)</div>
          <table class="mini-table">
            <thead><tr>
              <th>Customer</th><th>Service</th><th>Date</th>
              <th>Amount</th><th>Status</th><th>Payment</th>
            </tr></thead>
            <tbody>${client.recentBookings.map(b => `
              <tr>
                <td>${escHtml(b.customer_name)}</td>
                <td>${escHtml(b.service_name)}</td>
                <td>${dt(b.date)}</td>
                <td style="font-variant-numeric:tabular-nums;">${aud(b.amount)}</td>
                <td>${statusBadge(b.status)}</td>
                <td>${payBadge(b.payment_status)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`
        : `<div class="expansion-label">Recent Bookings</div><div class="no-bookings">No bookings yet.</div>`

      return `
        <div class="expansion-inner">
          <div class="expansion-settings">
            <div class="expansion-label">Widget Settings</div>
            <div class="setting-row">
              <div>
                <div class="setting-label">Custom Styling</div>
                <div class="setting-desc">Widget adapts to the client's website colours and font. When off, the widget uses the MCBook dark theme.</div>
              </div>
              <label class="toggle" title="Toggle custom styling">
                <input type="checkbox" class="toggle-input" data-styling="${escAttr(client.id)}"
                  ${client.widget_custom_styling ? 'checked' : ''}>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
          ${bookingsHtml}
        </div>
      `
    }

    function statusBadge(s) {
      const map = {
        confirmed:  ['badge-green',  'Confirmed'],
        cancelled:  ['badge-yellow', 'Cancelled'],
        completed:  ['badge-green',  'Completed'],
        pending:    ['badge-yellow', 'Pending'],
        no_show:    ['badge-yellow', 'No-show'],
      }
      const [cls, label] = map[s] ?? ['', s ?? '—']
      return cls ? `<span class="badge ${cls}">${label}</span>` : `<span style="color:var(--text-3)">${label}</span>`
    }

    function payBadge(s) {
      const map = {
        paid:     ['badge-green',  'Paid'],
        pending:  ['badge-yellow', 'Pending'],
        failed:   ['', 'Failed'],
        refunded: ['badge-yellow', 'Refunded'],
      }
      const [cls, label] = map[s] ?? ['', s ?? '—']
      return cls ? `<span class="badge ${cls}">${label}</span>` : `<span style="color:var(--text-3)">${label}</span>`
    }

    // ── Fee inline edit ───────────────────────────────────────────────────────
    function startFeeEdit(id) {
      document.getElementById(`fee-display-${id}`).classList.add('hidden')
      document.getElementById(`fee-edit-${id}`).classList.add('active')
      document.getElementById(`fee-err-${id}`).classList.remove('visible')
      document.getElementById(`fee-input-${id}`).focus()
    }
    function cancelFeeEdit(id) {
      document.getElementById(`fee-display-${id}`).classList.remove('hidden')
      document.getElementById(`fee-edit-${id}`).classList.remove('active')
    }
    async function saveFee(id) {
      const input   = document.getElementById(`fee-input-${id}`)
      const errEl   = document.getElementById(`fee-err-${id}`)
      const saveBtn = document.querySelector(`[data-save="${id}"]`)
      const val     = parseFloat(input.value)

      errEl.classList.remove('visible')

      if (isNaN(val) || val < 0 || val > 100) {
        errEl.textContent = 'Must be 0–100'
        errEl.classList.add('visible')
        return
      }

      saveBtn.disabled    = true
      saveBtn.textContent = 'Saving…'

      try {
        const res = await fetch(UPDATE_URL, {
          method:  'POST',
          headers: {
            Authorization:  `Bearer ${session.access_token}`,
            apikey:         ANON_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ client_id: id, platform_fee_percent: val }),
        })
        const data = await res.json()
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`)

        // Update in-place
        document.getElementById(`fee-value-${id}`).textContent = val.toFixed(2) + '%'
        const client = allClients.find(c => c.id === id)
        if (client) {
          client.platform_fee_percent = val
          client.myRevenue = client.totalEarnings * (val / 100)
          // Recalculate platform revenue stat
          const totalMyRevenue = allClients.reduce((s, c) => s + (c.myRevenue || 0), 0)
          document.getElementById('stat-revenue').textContent = aud(totalMyRevenue)
        }
        cancelFeeEdit(id)
        showToast('Fee saved')
      } catch (err) {
        errEl.textContent = err.message || 'Save failed'
        errEl.classList.add('visible')
      } finally {
        saveBtn.disabled    = false
        saveBtn.textContent = 'Save'
      }
    }

    // ── Custom styling toggle ─────────────────────────────────────────────────
    async function saveCustomStyling(id, enabled, chk) {
      chk.disabled = true
      try {
        const res = await fetch(UPDATE_URL, {
          method:  'POST',
          headers: {
            Authorization:  `Bearer ${session.access_token}`,
            apikey:         ANON_KEY,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ client_id: id, widget_custom_styling: enabled }),
        })
        const data = await res.json()
        if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`)
        const client = allClients.find(c => c.id === id)
        if (client) client.widget_custom_styling = enabled
        showToast(`Custom styling ${enabled ? 'enabled' : 'disabled'}`)
      } catch (err) {
        chk.checked = !enabled  // revert
        showToast('Save failed: ' + (err.message || 'unknown error'))
      } finally {
        chk.disabled = false
      }
    }

    // ── Row expansion ─────────────────────────────────────────────────────────
    function toggleExpansion(id, btn) {
      const expandRow = document.getElementById(`expand-${id}`)
      const isOpen    = expandRow.classList.contains('open')

      // Close previously open row
      if (expandedId && expandedId !== id) {
        const prev    = document.getElementById(`expand-${expandedId}`)
        const prevBtn = document.querySelector(`[data-toggle="${expandedId}"]`)
        prev?.classList.remove('open')
        if (prevBtn) { prevBtn.classList.remove('open'); prevBtn.textContent = '▼ Details' }
      }

      if (isOpen) {
        expandRow.classList.remove('open')
        btn.classList.remove('open')
        btn.textContent = '▼ Details'
        expandedId = null
      } else {
        expandRow.classList.add('open')
        btn.classList.add('open')
        btn.textContent = '▲ Close'
        expandedId = id
      }
    }

    // ── Search ────────────────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase()
      const filtered = allClients.filter(c =>
        (c.business_name || '').toLowerCase().includes(q) ||
        (c.email         || '').toLowerCase().includes(q)
      )
      renderTable(filtered)
    })

    // ── Helpers ───────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    }
    function escAttr(str) {
      return String(str ?? '').replace(/"/g, '&quot;')
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    loadData()
  </script>
</body>
</html>
