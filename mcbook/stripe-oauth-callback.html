<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecting Stripe — MCBook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e; --accent: #4ade80; --text: #ffffff; --text-2: #8b8b9e; --danger: #ef4444; --radius: 12px; --radius-sm: 8px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(74,222,128,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 10px; }
    p  { font-size: 0.85rem; color: var(--text-2); line-height: 1.6; }
    .icon { font-size: 2.8rem; display: block; margin-bottom: 20px; }
    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 11px 20px; margin-top: 24px; border-radius: var(--radius-sm); background: var(--accent); color: #0a0a0f; font-family: inherit; font-size: 0.88rem; font-weight: 700; text-decoration: none; }
    .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text); }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Connecting your Stripe account…</h1>
    <p>Just a moment while we link everything up.</p>
  </div>

  <script type="module">
    const SUPABASE_URL = 'https://uijudgnqawtvjyjuyuwo.supabase.co'
    const card = document.getElementById('card')

    // ── Check for Stripe error (user cancelled, etc.) ─────────────────────────
    const params = new URLSearchParams(window.location.search)
    const error  = params.get('error')
    const code   = params.get('code')

    if (error) {
      card.innerHTML = `
        <span class="icon">&#10060;</span>
        <h1>Connection cancelled</h1>
        <p>${params.get('error_description') ?? 'The Stripe connection was cancelled.'}</p>
        <a href="stripe-onboarding.html" class="btn btn-secondary">&#8592; Back to Payouts</a>`
      throw new Error(error)
    }

    if (!code) {
      card.innerHTML = `
        <span class="icon">&#9888;&#65039;</span>
        <h1>Missing authorisation code</h1>
        <p>Something went wrong with the Stripe redirect. Please try again.</p>
        <a href="stripe-onboarding.html" class="btn btn-secondary">&#8592; Back to Payouts</a>`
      throw new Error('No OAuth code in URL')
    }

    // ── Auth — refresh session first to ensure token is fresh ─────────────────
    import { supabase } from './js/supabase.js'
    const { data: { session: freshSession } } = await supabase.auth.getSession()
    if (!freshSession) {
      // No session at all — redirect to login, then come back
      window.location.href = 'login.html'
      throw new Error('No session')
    }
    // Proactively refresh if token is close to expiry (within 60s)
    const expiresAt  = freshSession.expires_at ?? 0
    const nowSeconds = Math.floor(Date.now() / 1000)
    const session    = (expiresAt - nowSeconds < 60)
      ? (await supabase.auth.refreshSession()).data.session ?? freshSession
      : freshSession

    // ── Exchange code for connected account ───────────────────────────────────
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/create-connect-account`, {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${session.access_token}`,
        },
        body: JSON.stringify({ code }),
      })

      const data = await res.json()
      if (!res.ok || data.error) throw new Error(data.error ?? `HTTP ${res.status}`)

      // ── Success — go to the return page ──────────────────────────────────
      window.location.href = 'stripe-return.html'

    } catch (err) {
      const isAuth = err.message === 'Unauthorized'
      card.innerHTML = `
        <span class="icon">&#10060;</span>
        <h1>Connection failed</h1>
        <p>${isAuth
          ? 'Your session expired during the Stripe redirect. Please sign in again and retry.'
          : err.message}</p>
        <a href="${isAuth ? 'login.html' : 'stripe-onboarding.html'}" class="btn btn-secondary">
          &#8592; ${isAuth ? 'Sign in again' : 'Try again'}
        </a>`
    }
  </script>
</body>
</html>
