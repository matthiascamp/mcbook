name: SMS Appointment Reminders

on:
  schedule:
    # Runs at 10 PM UTC daily = 8 AM AEST (UTC+10)
    # Adjust the hour to match your clients' timezone if needed
    - cron: '0 22 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-reminders edge function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://uijudgnqawtvjyjuyuwo.supabase.co/functions/v1/send-reminders" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -d '{}')

          HTTP_BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)

          echo "Response: $HTTP_BODY"
          echo "HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: Reminder function returned $HTTP_CODE"
            exit 1
          fi
